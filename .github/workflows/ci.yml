name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check taskpane.js

      - name: Validate manifest
        run: npx --yes office-addin-manifest validate manifest.xml

      - name: Run tests
        run: npm test
