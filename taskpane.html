<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocFill</title>
  <link rel="stylesheet" href="taskpane.css?v=132"/>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <div id="app">

    <header>
      <div class="header-logo">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect width="18" height="18" rx="4" fill="white" fill-opacity="0.15"/>
          <path d="M4 9h10M9 4v10" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <rect x="5.5" y="5.5" width="3" height="3" rx="0.75" fill="white" fill-opacity="0.7"/>
          <rect x="9.5" y="9.5" width="3" height="3" rx="0.75" fill="white" fill-opacity="0.7"/>
        </svg>
        <span class="header-title">DocFill</span>
      </div>
      <p class="header-sub">Create and fill document templates</p>
    </header>

    <div id="tab-bar">
      <button class="tab-btn" id="tab-btn-create" onclick="switchTab('create')">Create</button>
      <button class="tab-btn active" id="tab-btn-fill" onclick="switchTab('fill')">Fill</button>
    </div>

    <main>

      <!-- Create panel -->
      <div id="panel-create" style="display:none">
        <div id="create-loading-status" class="scan-banner" style="display:none"></div>
        <div id="selection-preview" class="selection-preview selection-idle">
          <svg class="selection-idle-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 1h4M5 13h4M7 1v12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span class="selection-idle-text">Highlight text in the document to begin</span>
        </div>

        <div class="create-form-group">
          <label class="create-label" for="placeholder-name-input">Placeholder name</label>
          <input
            id="placeholder-name-input"
            class="field-value-input"
            type="text"
            placeholder="e.g. client_name"
            spellcheck="false"
            autocorrect="off"
            autocapitalize="off"
            disabled
          />
          <p class="create-field-hint">Letters, numbers, and underscores only</p>
        </div>

        <button class="btn btn-primary btn-disabled" id="create-replace-btn" onclick="createPlaceholder()" disabled>
          Convert to Placeholder
        </button>

        <div id="create-status"></div>

        <div id="created-list-section" style="display:none">
          <div class="created-list-header">
            <span>Created so far</span>
            <span class="created-list-count" id="created-list-count"></span>
          </div>
          <div class="created-list-search-wrap">
            <svg class="created-list-search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="5.5" cy="5.5" r="4.25" stroke="currentColor" stroke-width="1.2"/><path d="M9 9l3.5 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            <input id="created-list-search" class="created-list-search" type="text" placeholder="Search fields..." oninput="filterCreatedList(this.value)" />
          </div>
          <div id="created-list" class="created-list-scroll"></div>
        </div>

      </div>

      <!-- Fill panel -->
      <div id="panel-fill">

        <!-- Empty state -->
        <div id="empty-state">
          <div class="empty-illustration">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <rect x="8" y="4" width="26" height="34" rx="3" fill="#e8edf5"/>
              <rect x="8" y="4" width="26" height="34" rx="3" stroke="#c5cfe0" stroke-width="1.2"/>
              <rect x="14" y="12" width="14" height="2" rx="1" fill="#a0aec0"/>
              <rect x="14" y="17" width="10" height="2" rx="1" fill="#a0aec0"/>
              <rect x="14" y="22" width="12" height="2" rx="1" fill="#a0aec0"/>
              <circle cx="36" cy="33" r="8" fill="#2563eb"/>
              <path d="M33 33h6M36 30v6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <h2 class="empty-title">Ready to fill</h2>
          <p class="empty-desc">Add <code>{{placeholders}}</code> to your document, then scan to detect fields.</p>
          <button class="btn btn-primary" id="scan-btn-empty" onclick="scanDocument()">
            Scan Document
          </button>
        </div>

        <!-- Fields -->
        <div id="fields-section">
          <div class="section-bar">
            <span class="field-count" id="field-count"></span>
            <div class="section-bar-actions">
              <button class="btn-ghost" onclick="scanDocument()">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M10.5 6A4.5 4.5 0 1 1 6 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                  <path d="M6 1.5L8 3.5M6 1.5L8-.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Rescan
              </button>
            </div>
          </div>

          <div class="fill-toolbar">
            <div class="fill-search-wrap">
              <svg class="fill-search-icon" width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="5.5" cy="5.5" r="4.25" stroke="currentColor" stroke-width="1.3"/><path d="M9 9l3.5 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              <input id="fill-search" class="fill-search" type="text" placeholder="Search fields..." oninput="filterFillFields(this.value)" />
            </div>
            <div class="fill-sort-wrap">
              <button class="fill-sort-btn" id="fill-sort-btn" onclick="toggleSortMenu()">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 2v10M2 10l2 2 2-2M10 12V2M8 4l2-2 2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <div class="fill-sort-menu" id="fill-sort-menu" style="display:none">
                <div class="fill-sort-header">Sort by</div>
                <button class="fill-sort-option active" id="sort-opt-doc" onclick="setFillSort('doc')">
                  <span class="fill-sort-check">&#10003;</span> Document order
                </button>
                <button class="fill-sort-option" id="sort-opt-az" onclick="setFillSort('az')">
                  <span class="fill-sort-check">&#10003;</span> Alphabetical (A-Z)
                </button>
              </div>
            </div>
          </div>

          <div id="hf-status" class="scan-banner" style="display:none"></div>

          <div id="global-date-format" style="display:none"></div>

          <div id="fields-list"></div>

          <div id="status"></div>
        </div>

      </div>

    </main>

    <footer id="actions">
      <button class="btn btn-primary" id="fill-btn" onclick="fillDocument()">
        Fill Document
      </button>
      <button class="btn-clear" onclick="clearForm()">Reset All Fields</button>
    </footer>

    <footer id="create-actions" style="display:none">
      <button class="btn btn-done" id="done-fill-btn" onclick="switchToFill()">
        Done — Fill This Template
      </button>
    </footer>

  </div>
  <script src="taskpane.js?v=135"></script>
</body>
</html>
